# Default configuration for Gone
# Save this file as 'config.toml' and modify as needed

[server]
# Port to listen on (1024-65535)
# Default: tries random port
# port = "8080"

# Content-Type header for the response
# Examples: "text/plain", "text/html", "application/json"
# content_type = "text/html"

# Server header to send in responses
# Tip: Using common server names like 'nginx' or 'apache' can help avoid Gone detection
server_name = "nginx"

# Custom endpoint path (must start with /)
# If not set, a random 64-character endpoint will be generated
# endpoint = "/s3cr3t"

# Path to output log file (optional)
# If not set, logs will only go to stdout
# output = "notgone.log"

# HTTPS is enabled by default
# If cert_path and key_path is not set, Gone will generate a self-signed SSL
# If you have another security layer (eg. Tor or SSL when port-forwarding), you may set this true to disable SSL
insecure_http = false

# Certificate path for SSL
# You can't use '../' for security reasons
# cert_path = "path/to/cert"

# Key path for SSL
# You can't use '../' for security reasons
# key_path = "path/to/key"

[content]
# Content to serve (choose one of the following options):

# 1. Serve text directly (best for simple messages)
text = "This is a secret message that will be shown once."

# 2. OR serve content from a file (uncomment and set the path)
# from_file = "/path/to/your/secret_file.txt"

[security]
# Maximum number of visits allowed per IP address before blocking
# Set to 0 for unlimited visits
max_visits = 5

# Allowed HTTP methods (visits with other methods will be blocked)
# Common methods: GET, POST, HEAD, PUT, DELETE, etc.
allowed_methods = ["GET"]

# List of IP addresses to always block
# Example: ["192.168.1.100", "10.0.0.1"]
blacklist = []

# List of allowed IP addresses (if not empty, only these IPs can access)
# Overrides blacklist for matching IPs
# Example: ["192.168.1.1", "203.0.113.42"]
whitelist = []
